# panda_hw_controllers.yaml
# Minimal controllers configuration for a single real Panda arm.


controller_manager:
  ros__parameters:
    update_rate: 1000        # 1 kHz control loop
    thread_priority: 98      # RT priority (matches libfranka docs)

    # --- Controller type declarations ---

    # Publishes /joint_states
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Publishes /franka_robot_state_broadcaster/robot_state
    franka_robot_state_broadcaster:
      type: franka_robot_state_broadcaster/FrankaRobotStateBroadcaster

    # (Optional) Robot model broadcaster, used by semantic components
    franka_robot_model_broadcaster:
      type: franka_robot_state_broadcaster/FrankaRobotModelBroadcaster

    # Your custom torque controller
    multi_mode_controller:
      type: multi_mode_controller/MultiModeController


# --- Controller-specific parameters ---
franka_robot_state_broadcaster:
  ros__parameters:
    # Non-blocking lock parameters (default values from franka_ros2 docs)
    lock_try_count: 5
    lock_sleep_interval: 5
    lock_log_error: false
    lock_update_success: true
    arm_id: panda                  
    frequency: 60


joint_state_broadcaster:
  ros__parameters:
    # If empty, it will publish all joint states
    # You can optionally restrict:
    # joints: [panda_joint1, panda_joint2, panda_joint3,
    #          panda_joint4, panda_joint5, panda_joint6, panda_joint7]
    use_urdf_to_filter: true



# Controller configuration for Panda arm and Allegro hand
multi_mode_controller:
  ros__parameters:
    arm_count: 1  # Update arm count to 2 (for Panda and Allegro hand)
    arm_1:
      arm_id: panda
    controllers: ["panda_joint_impedance_controller", "panda_cartesian_impedance_controller"]
    resources:
      panda_joint_impedance_controller: ["panda"]
      panda_cartesian_impedance_controller: ["panda"] 
    start_controllers:
      names: ["panda_joint_impedance_controller"]
      resources:
        panda_joint_impedance_controller: ["panda"]
